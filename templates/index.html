<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Cultivar Classifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Inline styles if CSS file is missing */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        input[type="number"] {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .predict-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .predict-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .reset-btn {
            background: #e0e0e0;
            color: #333;
        }

        .example-btn {
            background: #4CAF50;
            color: white;
        }

        .result-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            display: none;
            margin-top: 20px;
        }

        .result-box.show {
            display: block;
        }

        .result-title {
            font-size: 1.5em;
            margin-bottom: 15px;
            text-align: center;
        }

        .result-content {
            font-size: 2em;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .confidence-info {
            text-align: center;
            font-size: 1.2em;
            margin-top: 10px;
        }

        .error-box {
            background: #f44336;
            color: white;
            padding: 15px;
            border-radius: 10px;
            display: none;
            margin-top: 20px;
        }

        .error-box.show {
            display: block;
        }

        .loading {
            text-align: center;
            display: none;
            margin: 20px 0;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍷 Wine Cultivar Classifier</h1>
        <p class="subtitle">AI-Powered Wine Origin Prediction</p>

        <form id="predictionForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="alcohol">Alcohol (%)</label>
                    <input type="number" id="alcohol" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="malic_acid">Malic Acid</label>
                    <input type="number" id="malic_acid" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="ash">Ash</label>
                    <input type="number" id="ash" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="alcalinity">Alcalinity of Ash</label>
                    <input type="number" id="alcalinity" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="magnesium">Magnesium</label>
                    <input type="number" id="magnesium" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="phenols">Total Phenols</label>
                    <input type="number" id="phenols" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="flavanoids">Flavanoids</label>
                    <input type="number" id="flavanoids" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="nonflavanoid">Nonflavanoid Phenols</label>
                    <input type="number" id="nonflavanoid" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="proanthocyanins">Proanthocyanins</label>
                    <input type="number" id="proanthocyanins" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="color_intensity">Color Intensity</label>
                    <input type="number" id="color_intensity" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="hue">Hue</label>
                    <input type="number" id="hue" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="od280">OD280/OD315</label>
                    <input type="number" id="od280" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="proline">Proline</label>
                    <input type="number" id="proline" step="0.01" required>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="predict-btn">🔮 Predict Cultivar</button>
                <button type="button" class="example-btn" onclick="loadExample()">📝 Load Example</button>
                <button type="button" class="reset-btn" onclick="resetForm()">🔄 Reset</button>
            </div>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing wine properties...</p>
        </div>

        <div class="error-box" id="errorBox"></div>

        <div class="result-box" id="resultBox">
            <div class="result-title">Prediction Result</div>
            <div class="result-content" id="predictionResult"></div>
            <div class="confidence-info" id="confidenceInfo"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('predictionForm');
        const resultBox = document.getElementById('resultBox');
        const loading = document.getElementById('loading');
        const errorBox = document.getElementById('errorBox');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Get all input values
            const features = [
                parseFloat(document.getElementById('alcohol').value),
                parseFloat(document.getElementById('malic_acid').value),
                parseFloat(document.getElementById('ash').value),
                parseFloat(document.getElementById('alcalinity').value),
                parseFloat(document.getElementById('magnesium').value),
                parseFloat(document.getElementById('phenols').value),
                parseFloat(document.getElementById('flavanoids').value),
                parseFloat(document.getElementById('nonflavanoid').value),
                parseFloat(document.getElementById('proanthocyanins').value),
                parseFloat(document.getElementById('color_intensity').value),
                parseFloat(document.getElementById('hue').value),
                parseFloat(document.getElementById('od280').value),
                parseFloat(document.getElementById('proline').value)
            ];

            // Show loading
            loading.classList.add('show');
            resultBox.classList.remove('show');
            errorBox.classList.remove('show');

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ features })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Display results
                    const className = data.class_name || `Class ${data.prediction}`;
                    const confidence = data.confidence ? (data.confidence * 100).toFixed(1) : '—';
                    
                    document.getElementById('predictionResult').textContent = className;
                    document.getElementById('confidenceInfo').textContent = 
                        `Confidence: ${confidence}%`;

                    resultBox.classList.add('show');
                } else {
                    throw new Error(data.error || 'Prediction failed');
                }
            } catch (error) {
                errorBox.textContent = 'Error: ' + error.message;
                errorBox.classList.add('show');
            } finally {
                loading.classList.remove('show');
            }
        });

        function loadExample() {
            // Example wine sample
            document.getElementById('alcohol').value = 13.2;
            document.getElementById('malic_acid').value = 2.77;
            document.getElementById('ash').value = 2.51;
            document.getElementById('alcalinity').value = 18.5;
            document.getElementById('magnesium').value = 96.0;
            document.getElementById('phenols').value = 1.09;
            document.getElementById('flavanoids').value = 0.52;
            document.getElementById('nonflavanoid').value = 0.86;
            document.getElementById('proanthocyanins').value = 1.69;
            document.getElementById('color_intensity').value = 5.8;
            document.getElementById('hue').value = 0.48;
            document.getElementById('od280').value = 1.03;
            document.getElementById('proline').value = 415.0;
        }

        function resetForm() {
            form.reset();
            resultBox.classList.remove('show');
            errorBox.classList.remove('show');
        }
    </script>
</body>
</html>
